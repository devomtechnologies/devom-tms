<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Devom TMS</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="header"></div>

<!-- HERO -->
<section class="hero">
  <h1>Transport Management System</h1>
  <p>Manage your transport business digitally</p>
  <a href="register.html" class="btn primary">Register Now</a>
</section>

<!-- FEATURES -->
<section class="features">
  <h2>Our Features</h2>

  <div class="feature-box">
    <h3>Vehicle Management</h3>
    <p>Track all vehicles easily</p>
  </div>

  <div class="feature-box">
    <h3>Billing System</h3>
    <p>Auto invoice & payment tracking</p>
  </div>

  <div class="feature-box">
    <h3>Driver Management</h3>
    <p>Manage drivers & trips</p>
  </div>

</section>

<div id="footer"></div>

<script>
fetch('components/header.html')
.then(res => res.text())
.then(data => document.getElementById('header').innerHTML = data);

fetch('components/footer.html')
.then(res => res.text())
.then(data => document.getElementById('footer').innerHTML = data);
</script>

</body>
</html>
