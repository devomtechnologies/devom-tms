<!DOCTYPE html>
<html>
<head>
<title>Devom TMS</title>

<style>
body{margin:0;font-family:Arial;background:#f5f7fb;}
.header{background:#0f172a;color:#fff;padding:15px 30px;display:flex;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;}
.logo img{height:40px;}
.container{display:flex;justify-content:center;align-items:center;height:80vh;}
.box{background:#fff;padding:30px;border-radius:10px;width:300px;text-align:center;box-shadow:0 0 10px #ccc;}
input{width:100%;padding:10px;margin:10px 0;}
button{width:100%;padding:10px;background:#0f172a;color:#fff;border:none;}
</style>

</head>

<body>

<div class="header">
    <div class="logo">
        <img src="images/logo.png" onerror="this.style.display='none'">
        <span>Devom TMS</span>
    </div>

    <div class="nav">
        <a href="#">Home</a>
        <a href="#">Login</a>
    </div>
</div>

<div class="container">
<div class="box">

<h2>Login</h2>

<form onsubmit="loginUser(event)">
<input id="email" placeholder="Email" required>
<input id="password" type="password" placeholder="Password" required>
<button>Login</button>
</form>

<br>
<a href="#" onclick="showRegister()">New User? Register</a>

</div>
</div>

<!-- REGISTER POPUP -->
<div id="registerBox" style="display:none;" class="container">
<div class="box">

<h2>Register</h2>

<form onsubmit="registerUser(event)">
<input id="r_email" placeholder="Email" required>
<input id="r_password" type="password" placeholder="Password" required>
<button>Register</button>
</form>

</div>
</div>

<script type="module" src="js/auth.js"></script>

<script>
function showRegister(){
document.querySelector('.container').style.display="none";
document.getElementById('registerBox').style.display="flex";
}
</script>
<div class="footer">
© 2026 Devom Technologies | All Rights Reserved
</div>
</body>
</html>
