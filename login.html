<!DOCTYPE html>
<html>
<head>
<title>Login</title>
</head>
<body>

<h2>Login</h2>

<form onsubmit="login(event)">
<input id="user" placeholder="User ID"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button>Login</button>
</form>

<script>
function login(e){
e.preventDefault();
if(localStorage.getItem(user.value)==pass.value){
localStorage.setItem("current",user.value);
window.location="dashboard.html";
}else{
alert("Wrong");
}
}
</script>

</body>
</html>
