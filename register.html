<!DOCTYPE html>
<html>
<head>
<title>Register</title>
</head>
<body>

<h2>Register</h2>

<form onsubmit="register(event)">
<input id="user" placeholder="User ID" required><br><br>
<input id="pass" type="password" placeholder="Password" required><br><br>
<button>Register</button>
</form>

<script>
function register(e){
e.preventDefault();
localStorage.setItem(user.value, pass.value);
alert("Registered");
window.location="login.html";
}
</script>

</body>
</html>
