<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devom Technologies - Register</title>
<style>
body {font-family: Arial, sans-serif; background:#f4f7fb; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;}
form {background:white; padding:30px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.2);}
input {width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px;}
button {background:#1d4ed8; color:white; border:none; padding:10px; width:100%; cursor:pointer;}
button:hover {background:#2563eb;}
</style>
</head>
<body>

<form>
<h2>Register</h2>
<input type="text" placeholder="Owner Name" required>
<input type="text" placeholder="Transport Name" required>
<input type="email" placeholder="Email" required>
<input type="tel" placeholder="Mobile Number" required>
<input type="text" placeholder="City" required>
<input type="text" placeholder="State" required>
<input type="text" placeholder="User ID" required>
<input type="password" placeholder="Password" required>
<button type="submit">Register</button>
</form>

</body>
</html>
